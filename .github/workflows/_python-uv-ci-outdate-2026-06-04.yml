name: Reusable Python uv CI

on:
  workflow_call:
    inputs:
      os_matrix:
        description: JSON array of runner labels. This is the only current repo-level CI difference.
        required: false
        type: string
        default: '["ubuntu-latest"]'

jobs:
  ci-test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.os_matrix) }}

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install project
        run: uv sync

      - name: Run pre-commit
        uses: j178/prek-action@v2

      - name: Run tests
        run: uv run pytest .
