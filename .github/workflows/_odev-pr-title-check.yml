name: Odev PR Title Check

on:
  workflow_call:
    inputs:
      local_dir:
        description: local source dir to install odev
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  check-title:
    runs-on: ubuntu-latest

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Check PR title
        shell: bash -e -u -o pipefail {0}
        env:
          LOCAL_DIR: ${{ inputs.local_dir }}
          GITHUB_PULL_REQUEST_TITLE: ${{ github.event.pull_request.title }}
          ODEV_GITHUB_URL: "https://github.com/Noai-oss/odev.git"
          ODEV_VERSION: "0.1.0"
        run: |
          printf '%s\n' "$GITHUB_PULL_REQUEST_TITLE" > pr_title.txt
          odev_path="${LOCAL_DIR:-git+$ODEV_GITHUB_URL@v$ODEV_VERSION}"
          uvx --from "$odev_path" odev-pr-title-check pr_title.txt
