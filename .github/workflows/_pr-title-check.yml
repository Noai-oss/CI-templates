name: Reusable PR Title Check

on:
  workflow_call:
    inputs:
      checker_source:
        description: uvx --from source for the title checker. Use "." in odev itself.
        required: false
        type: string
        default: git+https://github.com/Noai-oss/odev.git@cd36de80bdbfc5e9b2c84f15210823562b87aa9d

permissions:
  contents: read
  pull-requests: read

jobs:
  check-title:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Check PR title
        shell: bash -e -u -o pipefail {0}
        env:
          GITHUB_PULL_REQUEST_TITLE: ${{ github.event.pull_request.title }}
        run: |
          printf '%s\n' "$GITHUB_PULL_REQUEST_TITLE" > pr_title.txt
          uvx --from "${{ inputs.checker_source }}" odev-commit-msg pr_title.txt
